    // ─── Close on outside click ─────────────────────────────────────────
    document.addEventListener('click', (e) => {
      if (!isPickerOpen()) return;
      if (pickerEl.contains(e.target)) return;
      if (e.target.closest('.emoji-trigger-btn') || e.target.closest('.task-icon') || e.target.closest('.group-icon') || e.target.closest('.modal-emoji-btn')) return;
      closePicker();

    // ─── Keyboard navigation ────────────────────────────────────────────
    pickerEl.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        closePicker();
        (pickerTarget ? document.querySelector(`[data-id="${pickerTarget}"] .task-icon`) : inputEmojiBtn)?.focus();
        return;
      }

      const btns = [...pickerGridWrap.querySelectorAll('.picker-emoji')];
      if (!btns.length) return;

      const cols = 8;

      if (e.key === 'Tab' && !e.shiftKey && document.activeElement === pickerSearch) {
        // Move focus from search into grid
        e.preventDefault();
        focusedEmojiIdx = 0;
        btns[0].focus();
        return;
      }

      if (e.key === 'Enter' && document.activeElement.classList.contains('picker-emoji')) {
        e.preventDefault();
        document.activeElement.click();
        return;
      }

      if (['ArrowRight', 'ArrowLeft', 'ArrowDown', 'ArrowUp'].includes(e.key)) {
        if (!document.activeElement.classList.contains('picker-emoji')) return;
        e.preventDefault();
        const cur = btns.indexOf(document.activeElement);
        let next = cur;
        if (e.key === 'ArrowRight') next = Math.min(cur + 1, btns.length - 1);
        if (e.key === 'ArrowLeft')  next = Math.max(cur - 1, 0);
        if (e.key === 'ArrowDown')  next = Math.min(cur + cols, btns.length - 1);
        if (e.key === 'ArrowUp')    next = Math.max(cur - cols, 0);
        btns[next].focus();
        focusedEmojiIdx = next;
      }
    });

    // ══════════════════════════════════════════════════════════════════════
    //  BACKGROUND IMAGE PICKER (Task 2.5)
    // ══════════════════════════════════════════════════════════════════════

    const bgPickerModal   = document.getElementById('bg-picker-modal');
    const bgPickerClose   = document.getElementById('bg-picker-close');
    const bgPickerRemove  = document.getElementById('bg-picker-remove');
    const bgPickerApply   = document.getElementById('bg-picker-apply');
    const bgUploadArea    = document.getElementById('bg-upload-area');
    const bgFileInput     = document.getElementById('bg-file-input');
    const bgUploadPreview = document.getElementById('bg-upload-preview');

    let bgPickerTaskId    = null;   // task id currently editing
    let bgPickerValue     = '';     // selected value: data URL, 'preset:N', or ''
    let bgPickerPrevFocus = null;   // element to restore focus to

    // ─── Build preset grid (once) ───────────────────────────────────
    BG_PRESETS.forEach((preset, i) => {

    // ─── Open / Close modal ─────────────────────────────────────────
    function openBgPicker(taskId) {
      bgPickerTaskId = taskId;
      bgPickerPrevFocus = document.activeElement;

      // Read current value from store
      const task = store.getState().tasks.find(t => t.id === taskId);
      bgPickerValue = task?.backgroundImage || '';

      // Reset upload preview
      bgUploadPreview.classList.remove('visible');
      bgSizeWarning.classList.remove('visible');

      // If current value is a data URL, show preview
      if (bgPickerValue && !bgPickerValue.startsWith('preset:')) {
        bgUploadPreview.src = bgPickerValue;
        bgUploadPreview.classList.add('visible');
      }

      updatePresetSelection();
      bgPickerModal.classList.add('open');
      requestAnimationFrame(() => bgUploadArea.focus());
    }

    function closeBgPicker() {
      bgPickerModal.classList.remove('open');
      bgPickerTaskId = null;
      bgPickerValue = '';
      bgUploadPreview.classList.remove('visible');
      bgSizeWarning.classList.remove('visible');
      bgPickerPrevFocus?.focus();
    }

    bgPickerClose.addEventListener('click', closeBgPicker);
    bgPickerModal.addEventListener('click', (e) => {
      if (e.target === bgPickerModal) closeBgPicker();
    });

    // ─── Keyboard: Escape to close ──────────────────────────────────
    bgPickerModal.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        closeBgPicker();
      }
      // Trap focus inside modal
      if (e.key === 'Tab') {
        const focusable = bgPickerModal.querySelectorAll('button, [tabindex="0"], input[type="file"]');
        const arr = [...focusable].filter(el => el.offsetParent !== null);
        if (!arr.length) return;
        const first = arr[0];
        const last = arr[arr.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    });

    // ─── File upload ────────────────────────────────────────────────
    bgUploadArea.addEventListener('click', () => bgFileInput.click());
    bgUploadArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        bgFileInput.click();
      }
    });

    // Drag & drop onto upload area
    bgUploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      bgUploadArea.style.borderColor = 'var(--color-accent)';
    });
    bgUploadArea.addEventListener('dragleave', () => {
      bgUploadArea.style.borderColor = '';
    });
    bgUploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      bgUploadArea.style.borderColor = '';
      const file = e.dataTransfer.files?.[0];
      if (file?.type?.startsWith('image/')) processImageFile(file);
    });

    bgFileInput.addEventListener('change', () => {
      const file = bgFileInput.files?.[0];
      if (file) processImageFile(file);
      bgFileInput.value = ''; // reset for re-upload
    });

    function processImageFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          compressImage(img, 0.7, (dataUrl) => {
            bgPickerValue = dataUrl;
            bgUploadPreview.src = dataUrl;
            bgUploadPreview.classList.add('visible');
            // Deselect presets
            updatePresetSelection();
          });
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    /**
     * Resize & compress image to fit max 400x300, target ≤50KB data URL.
     * Progressively reduces quality if needed.
     */
    function compressImage(img, quality, callback) {
      const MAX_W = 400, MAX_H = 300, MAX_SIZE = 50 * 1024;
      let w = img.naturalWidth, h = img.naturalHeight;

      // Scale down
      if (w > MAX_W || h > MAX_H) {
        const ratio = Math.min(MAX_W / w, MAX_H / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }

      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      let q = quality;
      let dataUrl = canvas.toDataURL('image/jpeg', q);

      // Progressive compression if too large
      bgSizeWarning.classList.remove('visible');
      while (dataUrl.length > MAX_SIZE && q > 0.1) {
        q -= 0.1;
        bgSizeWarning.classList.add('visible');
        dataUrl = canvas.toDataURL('image/jpeg', q);
      }

      // If still too large after min quality, reduce dimensions further
      if (dataUrl.length > MAX_SIZE) {
        const smallCanvas = document.createElement('canvas');
        const scale = 0.6;
        smallCanvas.width = Math.round(w * scale);
        smallCanvas.height = Math.round(h * scale);
        smallCanvas.getContext('2d').drawImage(canvas, 0, 0, smallCanvas.width, smallCanvas.height);
        dataUrl = smallCanvas.toDataURL('image/jpeg', 0.5);
      }

      callback(dataUrl);
    }

    // ─── Apply / Remove ──────────────────────────────────────────────
    bgPickerApply.addEventListener('click', () => {
      if (!bgPickerTaskId) return;
      store.setState(prev => ({
        tasks: prev.tasks.map(t =>

      }));
      closeBgPicker();

    bgPickerRemove.addEventListener('click', () => {

      closeBgPicker();

    document.getElementById('todo-list').addEventListener('click', (e) => {

      openBgPicker(item.dataset.id);
    });

    // ══════════════════════════════════════════════════════════════════════
    //  TASK GROUPS — Create, render, subtask CRUD (Task 3.4)
    // ══════════════════════════════════════════════════════════════════════

    const groupListEl      = document.getElementById('group-list');
    const createGroupBtn   = document.getElementById('create-group-btn');
    const groupModal       = document.getElementById('group-modal');
    const groupModalClose  = document.getElementById('group-modal-close');
    const groupModalCancel = document.getElementById('group-modal-cancel');
    const groupModalSubmit = document.getElementById('group-modal-submit');
    const groupTitleInput  = document.getElementById('group-title-input');
    const groupEmojiBtn    = document.getElementById('group-emoji-btn');

    let pendingGroupIcon = '📁';

    // ─── Modal open/close ─────────────────────────────────────────────
    function openGroupModal() {
      groupTitleInput.value = '';
      pendingGroupIcon = '📁';
      groupEmojiBtn.textContent = '📁';
      groupModal.classList.add('open');
      requestAnimationFrame(() => groupTitleInput.focus());
    }

    function closeGroupModal() {

    }

    createGroupBtn.addEventListener('click', openGroupModal);
    groupModalClose.addEventListener('click', closeGroupModal);
    groupModalCancel.addEventListener('click', closeGroupModal);

    // Close modal on overlay click
    groupModal.addEventListener('click', (e) => {

    });

    // Close modal on Escape
    groupModal.addEventListener('keydown', (e) => {

    });

    // Group emoji picker trigger
    groupEmojiBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      // Use shared emoji picker, target = 'group-modal'
      pickerTarget = '__group_modal__';
      activeCatIdx = 0;
      pickerSearch.value = '';
      renderPickerGrid();
      updateCatPills();
      pickerPreview.textContent = pendingGroupIcon;
      pickerEl.classList.add('open');
      requestAnimationFrame(() => {
        const tr = groupEmojiBtn.getBoundingClientRect();
        const pk = pickerEl.getBoundingClientRect();
        let top  = tr.bottom + 6;
        let left = tr.left;
        if (left + pk.width > window.innerWidth - 12) left = window.innerWidth - pk.width - 12;
        if (left < 12) left = 12;
        if (top + pk.height > window.innerHeight - 12) top = tr.top - pk.height - 6;
        if (top < 12) top = 12;
        pickerEl.style.top  = top + 'px';
        pickerEl.style.left = left + 'px';
        pickerSearch.focus();
      });

    // Patch selectEmoji to support group-modal target
    const _origSelectEmoji = selectEmoji;
    selectEmoji = function(emoji) {
      if (pickerTarget === '__group_modal__') {
        pendingGroupIcon = emoji;
        groupEmojiBtn.textContent = emoji;
        pickerPreview.textContent = emoji;
        closePicker();
        return;
      }
      // Check if target is a group icon (format: 'group:<id>')
      if (typeof pickerTarget === 'string' && pickerTarget.startsWith('group:')) {
        const gid = pickerTarget.slice(6);
        store.setState(prev => ({
          groups: prev.groups.map(g => g.id === gid ? { ...g, icon: emoji } : g),
        }));
        pickerPreview.textContent = emoji;
        closePicker();
        return;
      }
      _origSelectEmoji(emoji);
    };

    // Patch clearPickerSelection for group targets
    const _origClearPicker = clearPickerSelection;
    clearPickerSelection = function() {
      if (pickerTarget === '__group_modal__') {
        pendingGroupIcon = '📁';
        groupEmojiBtn.textContent = '📁';
        pickerPreview.textContent = '';
        closePicker();
        return;
      }
      if (typeof pickerTarget === 'string' && pickerTarget.startsWith('group:')) {
        const gid = pickerTarget.slice(6);
        store.setState(prev => ({
          groups: prev.groups.map(g => g.id === gid ? { ...g, icon: '📁' } : g),
        }));
        pickerPreview.textContent = '';
        closePicker();
        return;
      }
      _origClearPicker();
    };

    // ─── Create group ─────────────────────────────────────────────────
    function createGroup() {
      const title = groupTitleInput.value.trim();
      if (!title) {
        groupTitleInput.classList.add('input-error');
        groupTitleInput.addEventListener('animationend', () => {
          groupTitleInput.classList.remove('input-error');
        }, { once: true });
        return;
      }

      const newGroup = {
        id:        crypto.randomUUID(),
        title,
        icon:      pendingGroupIcon,
        subtasks:  [],
        createdAt: Date.now(),
        collapsed: false,
        order:     (store.getState().groups || []).length,
      };

      _newGroupIds.add(newGroup.id);
      store.setState(prev => ({
        groups: [...(prev.groups || []), newGroup],
      }));

      closeGroupModal();
    }

    groupModalSubmit.addEventListener('click', createGroup);
    groupTitleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') createGroup();
    });

    // ─── Group subtask operations ─────────────────────────────────────
    const _newSubtaskIds = new Set();  // track for appear animation
    const _newGroupIds   = new Set();  // track for group appear animation

    function addSubtask(groupId, text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      const sub = {
        id:        crypto.randomUUID(),
        text:      trimmed,
        done:      false,
        createdAt: Date.now(),
        order:     0,
      };
      _newSubtaskIds.add(sub.id);
      store.setState(prev => ({
        groups: prev.groups.map(g => {
          if (g.id !== groupId) return g;
          const subs = [...g.subtasks, { ...sub, order: g.subtasks.length }];
          return { ...g, subtasks: subs };
        }),
      }));
    }

    const _poppingSubtaskIds = new Set(); // track for check pop animation

    function toggleSubtask(groupId, subtaskId) {
      _poppingSubtaskIds.add(subtaskId);
      store.setState(prev => ({
        groups: prev.groups.map(g => {
          if (g.id !== groupId) return g;
          return {
            ...g,
            subtasks: g.subtasks.map(s => s.id === subtaskId ? { ...s, done: !s.done } : s),
          };
        }),
      }));
    }

    function deleteSubtask(groupId, subtaskId, el) {
      const doDelete = () => {
        store.setState(prev => ({
          groups: prev.groups.map(g => {
            if (g.id !== groupId) return g;
            return { ...g, subtasks: g.subtasks.filter(s => s.id !== subtaskId) };
          }),
        }));
      };
      if (el) {
        el.classList.add('removing');
        el.addEventListener('animationend', doDelete, { once: true });
      } else {
        doDelete();
      }
    }

    function deleteGroup(groupId, el) {
      const doDelete = () => {
        store.setState(prev => ({
          groups: prev.groups.filter(g => g.id !== groupId),
        }));
      };
      if (el) {
        el.classList.add('removing');
        el.addEventListener('animationend', doDelete, { once: true });
      } else {
        doDelete();
      }
    }

    function toggleGroupCollapse(groupId) {
      store.setState(prev => ({
        groups: prev.groups.map(g =>
          g.id === groupId ? { ...g, collapsed: !g.collapsed } : g
        ),
      }));
    }

    // ─── Filter groups by subtask state ───────────────────────────────
    function getFilteredGroups(groups, filter) {
      if (!groups) return [];
      const sorted = [...groups].sort((a, b) => a.order - b.order);
      if (filter === 'active') return sorted.filter(g => g.subtasks.some(s => !s.done));
      if (filter === 'done')   return sorted.filter(g => g.subtasks.length > 0 && g.subtasks.every(s => s.done));
      return sorted;
    }

    // ─── Build group card DOM ─────────────────────────────────────────
    function buildGroupEl(group, filter) {
      const card = document.createElement('div');
      card.className = 'group-card' + (group.collapsed ? ' collapsed' : '');
      card.dataset.groupId = group.id;

      const total = group.subtasks.length;
      const done  = group.subtasks.filter(s => s.done).length;
      const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

      // Header
      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <span class="group-chevron">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
        <span class="group-icon" data-group-icon="${group.id}">${group.icon || '📁'}</span>
        <span class="group-title">${escapeHtml(group.title)}</span>
        <span class="group-progress-info">
          <span>${done}/${total}</span>
          <span class="group-progress-bar">
            <span class="group-progress-fill${pct === 100 && total > 0 ? ' complete' : ''}" style="width:${pct}%"></span>
          </span>
        </span>
        <div class="group-actions">
          <button class="task-action-btn delete-btn" data-group-action="delete" aria-label="Удалить группу" title="Удалить группу">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      `;

      // Click on chevron/header to toggle collapse
      header.addEventListener('click', (e) => {
        if (e.target.closest('[data-group-action]')) return;
        if (e.target.closest('.group-icon')) return;
        toggleGroupCollapse(group.id);
      });

      // Click on group icon to open emoji picker
      header.querySelector('.group-icon').addEventListener('click', (e) => {
        e.stopPropagation();
        const iconEl = e.currentTarget;
        pickerTarget = 'group:' + group.id;
        activeCatIdx = 0;
        pickerSearch.value = '';
        renderPickerGrid();
        updateCatPills();
        pickerPreview.textContent = group.icon || '📁';
        pickerEl.classList.add('open');
        requestAnimationFrame(() => {
          const tr = iconEl.getBoundingClientRect();
          const pk = pickerEl.getBoundingClientRect();
          let top  = tr.bottom + 6;
          let left = tr.left;
          if (left + pk.width > window.innerWidth - 12) left = window.innerWidth - pk.width - 12;
          if (left < 12) left = 12;
          if (top + pk.height > window.innerHeight - 12) top = tr.top - pk.height - 6;
          if (top < 12) top = 12;
          pickerEl.style.top  = top + 'px';
          pickerEl.style.left = left + 'px';
          pickerSearch.focus();
        });
      });

      // Delete group
      header.querySelector('[data-group-action="delete"]').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteGroup(group.id, card);
      });

      card.appendChild(header);

      // Body
      const body = document.createElement('div');
      body.className = 'group-body';

      // Subtask list
      const subList = document.createElement('div');
      subList.className = 'subtask-list';

      const filteredSubs = filter === 'active'
        ? group.subtasks.filter(s => !s.done)
        : filter === 'done'
          ? group.subtasks.filter(s => s.done)
          : group.subtasks;

      const sortedSubs = [...filteredSubs].sort((a, b) => a.order - b.order);

      if (sortedSubs.length === 0 && group.subtasks.length === 0) {
        const hint = document.createElement('div');
        hint.className = 'group-empty-hint';
        hint.textContent = 'Добавьте первую подзадачу';
        subList.appendChild(hint);
      } else if (sortedSubs.length === 0) {
        const hint = document.createElement('div');
        hint.className = 'group-empty-hint';
        hint.textContent = filter === 'active' ? 'Нет активных подзадач' : 'Нет выполненных подзадач';
        subList.appendChild(hint);
      } else {
        sortedSubs.forEach(sub => {
          const subEl = document.createElement('div');
          const isNewSub = _newSubtaskIds.has(sub.id);
          subEl.className = 'subtask-item' + (sub.done ? ' done' : '') + (isNewSub ? ' appearing' : '');
          if (isNewSub) {
            _newSubtaskIds.delete(sub.id);
            subEl.addEventListener('animationend', () => subEl.classList.remove('appearing'), { once: true });
          }
          subEl.dataset.subtaskId = sub.id;
          subEl.tabIndex = 0;
          subEl.setAttribute('role', 'listitem');
          subEl.setAttribute('aria-label', `${sub.done ? 'Выполнено: ' : ''}${sub.text}`);
          subEl.innerHTML = `
            <button class="subtask-check" aria-label="${sub.done ? 'Вернуть подзадачу' : 'Отметить выполненной'}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </button>
            <span class="subtask-text">${escapeHtml(sub.text)}</span>
            <button class="subtask-delete" aria-label="Удалить подзадачу">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          `;
          const checkBtn = subEl.querySelector('.subtask-check');
          // Apply pop animation if this subtask was just toggled (Task 4.1)
          if (_poppingSubtaskIds.has(sub.id)) {
            _poppingSubtaskIds.delete(sub.id);
            checkBtn.classList.add('popping');
            checkBtn.addEventListener('animationend', () => checkBtn.classList.remove('popping'), { once: true });
          }
          checkBtn.addEventListener('click', () => toggleSubtask(group.id, sub.id));
          subEl.querySelector('.subtask-delete').addEventListener('click', () => deleteSubtask(group.id, sub.id, subEl));
          subList.appendChild(subEl);
        });
      }

      body.appendChild(subList);

      // Subtask input row
      const inputRow = document.createElement('div');
      inputRow.className = 'subtask-input-row';
      inputRow.innerHTML = `
        <input class="subtask-input" type="text" placeholder="Новая подзадача..." maxlength="200" autocomplete="off" />
        <button class="subtask-add-btn" aria-label="Добавить подзадачу">+</button>
      `;
      const subInput  = inputRow.querySelector('.subtask-input');
      const subAddBtn = inputRow.querySelector('.subtask-add-btn');

      function handleAddSubtask() {
        addSubtask(group.id, subInput.value);
        subInput.value = '';
        subInput.focus();
      }
      subAddBtn.addEventListener('click', handleAddSubtask);
      subInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleAddSubtask();
      });

      body.appendChild(inputRow);
      card.appendChild(body);

      return card;
    }

    // ─── Render groups list ───────────────────────────────────────────
    function renderGroups(state) {
      const filtered = getFilteredGroups(state.groups, state.filter);

      groupListEl.innerHTML = '';
      filtered.forEach(group => {
        const card = buildGroupEl(group, state.filter);
        // Appear animation for new groups (Task 4.1)
        if (_newGroupIds.has(group.id)) {
          _newGroupIds.delete(group.id);
          card.classList.add('appearing');
          card.addEventListener('animationend', () => card.classList.remove('appearing'), { once: true });
        }
        groupListEl.appendChild(card);
      });
    }

    // Register renderGroups into the master render chain and trigger initial render
    _renderGroupsFn = renderGroups;
    renderGroups(store.getState());

    // ══════════════════════════════════════════════════════════════════════
    //  ACCESSIBILITY & HOTKEYS (Task 4.2)
    // ══════════════════════════════════════════════════════════════════════

    const hotkeyHint = document.getElementById('hotkey-hint');
    let hotkeyHintTimer = null;

    function showHotkeyHint(html) {
      clearTimeout(hotkeyHintTimer);
      hotkeyHint.innerHTML = html;
      hotkeyHint.classList.add('visible');
      hotkeyHintTimer = setTimeout(() => hotkeyHint.classList.remove('visible'), 2000);
    }

    // ─── Get focused task id ──────────────────────────────────────────
    function getFocusedTaskId() {
      const el = document.activeElement;
      if (el && el.classList.contains('todo-item')) return el.dataset.id;
      return null;
    }

    // ─── Arrow key navigation between todo items ──────────────────────
    document.getElementById('todo-list').addEventListener('keydown', (e) => {
      const item = e.target.closest('.todo-item');
      if (!item) return;

      const items = [...document.querySelectorAll('#todo-list .todo-item')];
      const idx = items.indexOf(item);

      if (e.key === 'ArrowDown' || e.key === 'j') {
        e.preventDefault();
        const next = items[idx + 1];
        if (next) next.focus();
      }
      if (e.key === 'ArrowUp' || e.key === 'k') {
        e.preventDefault();
        const prev = items[idx - 1];
        if (prev) prev.focus();
      }
      // Enter or Space toggles the task
      if (e.key === 'Enter' || e.key === ' ') {
        if (e.target === item) {
          e.preventDefault();
          toggleTask(item.dataset.id);
        }
      }
      // Delete or Backspace deletes the focused task
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (e.target === item) {
          e.preventDefault();
          const nextFocus = items[idx + 1] || items[idx - 1] || todoInput;
          deleteTask(item.dataset.id);
          requestAnimationFrame(() => {
            setTimeout(() => nextFocus.focus(), 400);
          });
          showHotkeyHint('<kbd>Del</kbd> Задача удалена');
        }
      }
    });

    // ─── Subtask keyboard navigation ──────────────────────────────────
    document.getElementById('group-list').addEventListener('keydown', (e) => {
      const subItem = e.target.closest('.subtask-item');
      if (!subItem) return;

      const card = subItem.closest('.group-card');
      if (!card) return;
      const subs = [...card.querySelectorAll('.subtask-item')];
      const idx = subs.indexOf(subItem);
      const groupId = card.dataset.groupId;

      if (e.key === 'ArrowDown' || e.key === 'j') {
        e.preventDefault();
        const next = subs[idx + 1];
        if (next) next.focus();
      }
      if (e.key === 'ArrowUp' || e.key === 'k') {
        e.preventDefault();
        const prev = subs[idx - 1];
        if (prev) prev.focus();
      }
      if (e.key === 'Enter' || e.key === ' ') {
        if (e.target === subItem) {
          e.preventDefault();
          toggleSubtask(groupId, subItem.dataset.subtaskId);
        }
      }
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (e.target === subItem) {
          e.preventDefault();
          deleteSubtask(groupId, subItem.dataset.subtaskId, subItem);
          showHotkeyHint('<kbd>Del</kbd> Подзадача удалена');
        }
      }
    });

    // ─── Global hotkeys ───────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      // Skip if in input/textarea or modal is open
      const tag = document.activeElement.tagName;
      const inInput = tag === 'INPUT' || tag === 'TEXTAREA';
      const modalOpen = groupModal.classList.contains('open') || bgPickerModal.classList.contains('open');
      const pickerOpen = isPickerOpen();

      // Ctrl+F or / — focus search/input
      if ((e.ctrlKey && e.key === 'f') || (!inInput && !modalOpen && !pickerOpen && e.key === '/')) {
        e.preventDefault();
        todoInput.focus();
        todoInput.select();
        showHotkeyHint('<kbd>Ctrl+F</kbd> Фокус на поле ввода');
        return;
      }

      // Escape — blur active element / close modal / close picker
      if (e.key === 'Escape') {
        if (pickerOpen) return; // handled by picker
        if (modalOpen) return;  // handled by modal
        if (inInput) {
          document.activeElement.blur();
          return;
        }
      }

      // Only process remaining hotkeys when not in input
      if (inInput || modalOpen || pickerOpen) return;

      // N — new task (focus input)
      if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        todoInput.focus();
        showHotkeyHint('<kbd>N</kbd> Новая задача');
        return;
      }

      // G — create group
      if (e.key === 'g' || e.key === 'G') {
        e.preventDefault();
        openGroupModal();
        showHotkeyHint('<kbd>G</kbd> Новая группа');
        return;
      }

      // 1, 2, 3 — filter tabs
      if (e.key === '1') {
        e.preventDefault();
        store.setState({ filter: 'all' });
        showHotkeyHint('<kbd>1</kbd> Все задачи');
        return;
      }
      if (e.key === '2') {
        e.preventDefault();
        store.setState({ filter: 'active' });
        showHotkeyHint('<kbd>2</kbd> Активные');
        return;
      }
      if (e.key === '3') {
        e.preventDefault();
        store.setState({ filter: 'done' });
        showHotkeyHint('<kbd>3</kbd> Готово');
        return;
      }

      // T — toggle theme
      if (e.key === 't' || e.key === 'T') {
        e.preventDefault();
        applyTheme(!html.classList.contains('dark'));
        showHotkeyHint('<kbd>T</kbd> Переключить тему');
        return;
      }

      // ? — show help
      if (e.key === '?') {
        e.preventDefault();
        showHotkeyHint(
          '<kbd>/</kbd> Поиск &nbsp; <kbd>N</kbd> Задача &nbsp; <kbd>G</kbd> Группа &nbsp; ' +
          '<kbd>1-3</kbd> Фильтр &nbsp; <kbd>T</kbd> Тема &nbsp; ' +
          '<kbd>↑↓</kbd> Навигация &nbsp; <kbd>Enter</kbd> Toggle &nbsp; <kbd>Del</kbd> Удалить'
        );
        clearTimeout(hotkeyHintTimer);
        hotkeyHintTimer = setTimeout(() => hotkeyHint.classList.remove('visible'), 5000);
        return;
      }
    });

    // Init theme: stored preference → system preference
    const storedTheme = store.getState().theme;
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(storedTheme ? storedTheme === 'dark' : prefersDark);

    toggleBtn.addEventListener('click', () => {
      applyTheme(!html.classList.contains('dark'));
    });
  </script>

</body>
</html>
